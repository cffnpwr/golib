name: Unit test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/mise.build-and-test.toml"
      - ".github/workflows/unit-test.yaml"

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit-test:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - runner: macos-15
            os: darwin
            arch: aarch64
          - runner: macos-15-intel
            os: darwin
            arch: x86_64
          - runner: windows-2025
            os: windows
            arch: x86_64
          - runner: windows-11-arm
            os: windows
            arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read mise config
        id: mise-config
        shell: bash
        run: |
          {
            echo "content<<EOF"
            cat .github/mise.build-and-test.toml
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          mise_toml: ${{ steps.mise-config.outputs.content }}

      - name: Run unit tests
        run: go test ./...
