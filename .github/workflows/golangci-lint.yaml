name: golangci-lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/mise.lint.toml"
      - ".github/workflows/golangci-lint.yaml"

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Run golangci-lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read mise config
        id: mise-config
        shell: bash
        run: |
          {
            echo "content<<EOF"
            cat .github/mise.lint.toml
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          mise_toml: ${{ steps.mise-config.outputs.content }}

      - name: Run golangci-lint
        run: golangci-lint run ./...
